<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Direct Wireframe Pattern Recognition Knowledge Base</title>
  <desc id="desc">Wireframe SVG yang diturunkan langsung dari struktur pattern-recognition-knowledge-base.html.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#222"/>
    </marker>
    <style>
      .page{fill:#f5f5f5}
      .navBar{fill:#fff;stroke:#bbb;stroke-width:1}
      .hero{fill:#111827}
      .wrap{fill:none;stroke:#aaa;stroke-width:1;stroke-dasharray:8 8}
      .card{fill:#fff;stroke:#222;stroke-width:2}
      .cardSoft{fill:#fafafa;stroke:#666;stroke-width:1.5}
      .tab{fill:#fff;stroke:#555;stroke-width:1.5}
      .tabActive{fill:#111827;stroke:#111827;stroke-width:1.5}
      .button{fill:#111827;stroke:#111827;stroke-width:1.5}
      .button2{fill:#efefef;stroke:#555;stroke-width:1.5}
      .field{fill:#fff;stroke:#666;stroke-width:1.5}
      .tableHead{fill:#ddd;stroke:#222;stroke-width:1.5}
      .tableCell{fill:#fff;stroke:#777;stroke-width:1}
      .alt{fill:#f7f7f7;stroke:#777;stroke-width:1}
      .badge{fill:#eee;stroke:#222;stroke-width:1}
      .badgeDark{fill:#333;stroke:#111;stroke-width:1}
      .line{stroke:#333;stroke-width:2;fill:none}
      .thin{stroke:#777;stroke-width:1.5;fill:none}
      .dash{stroke:#333;stroke-width:1.5;stroke-dasharray:7 5;fill:none}
      .txt{font-family:Arial, Helvetica, sans-serif;fill:#111}
      .white{font-family:Arial, Helvetica, sans-serif;fill:#fff}
      .navTxt{font-family:Arial, Helvetica, sans-serif;font-size:14px;font-weight:700;fill:#222}
      .small{font-size:13px}
      .tiny{font-size:11px}
      .label{font-size:15px;font-weight:700}
      .h1{font-size:28px;font-weight:700}
      .h2{font-size:21px;font-weight:700}
      .kpi{font-size:27px;font-weight:700}
      .muted{fill:#555}
      .ann{fill:#fff;stroke:#111;stroke-width:1.5;stroke-dasharray:5 5}
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1920" height="1080"/>
  <rect class="wrap" x="18" y="18" width="1884" height="1044" rx="8"/>
  <text class="txt tiny" x="34" y="1048">Canvas 16:9 desktop | Low-fidelity SVG | Direct mapping dari pattern-recognition-knowledge-base.html</text>

