    <rect class="tabActive" x="0" y="0" width="210" height="38" rx="19"/>
    <text class="white" x="24" y="24" font-size="14" font-weight="700">1. Pattern Recognition Map</text>
    <rect class="tab" x="224" y="0" width="250" height="38" rx="19"/>
    <text class="txt small" x="246" y="24" font-weight="700">2. Tabel Risiko &amp; Action Scoring</text>
    <rect class="tab" x="488" y="0" width="210" height="38" rx="19"/>
