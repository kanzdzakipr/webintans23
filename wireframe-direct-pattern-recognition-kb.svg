  <text class="white" x="58" y="103" font-size="27" font-weight="700">Pattern Recognition &amp; Knowledge Base</text>
  <text class="white" x="58" y="131" font-size="15">Dashboard revisi: setiap entri risiko menyediakan 3 opsi Preventive, 3 opsi Corrective, dan 3 opsi Predictive.</text>
  <text class="white" x="58" y="150" font-size="15">Setiap opsi diberi scoring berbasis baseline operasional dan expert judgment; keputusan akhir tetap manusia/pakar/operator.</text>

