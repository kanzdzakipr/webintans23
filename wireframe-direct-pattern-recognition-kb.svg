  <!-- HTML implementation notes -->
  <rect class="ann" x="130" y="995" width="1660" height="45" rx="8"/>
  <text class="txt tiny" x="148" y="1015">Implementasi aktual di file: pattern-recognition-knowledge-base.html. Data utama: RECORDS hardcoded 65 relasi, actionOptions menghasilkan 9 opsi per risiko, scoring tersimpan di localStorage, exportCSV mengunduh keputusan_action_scoring_9opsi_kayla.csv.</text>
  <text class="txt tiny" x="148" y="1032">Alur pengguna aktual: filter/klik node -> render detail table -> ubah skor 1-5 -> rekomendasi skor tertinggi -> pilih keputusan manusia -> catatan -> export CSV.</text>
