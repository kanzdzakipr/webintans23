  <text class="navTxt" x="58" y="36">Home</text>
  <text class="navTxt" x="116" y="36">Knowledge Base</text>
  <rect class="tabActive" x="236" y="15" width="172" height="30" rx="15"/>
  <text class="white" x="258" y="35" font-size="14" font-weight="700">Pattern Recognition KB</text>
  <text class="navTxt" x="430" y="36">Alur Penanganan Proses Petikemas</text>
  <text class="navTxt" x="680" y="36">Profil TPK v</text>
