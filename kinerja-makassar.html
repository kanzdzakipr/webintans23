        let globalData = [];

        // ==========================
        // 1. DATA PARSING
        // ==========================
        function processCSV(csvString, terminalName) {
            const parsed = Papa.parse(csvString, { skipEmptyLines: true });
            const lines = parsed.data;
            
            // Find header dynamically to handle differences
            let headerIdx = -1;
            for(let i=0; i<lines.length; i++) {
                if(lines[i].some(cell => cell && cell.toString().toUpperCase().includes("JANUARI"))) {
                    headerIdx = i;
                    break;
                }
            }
            if(headerIdx === -1) return;

            const headerRow = lines[headerIdx].map(x => x ? x.toString().toUpperCase().trim() : "");
            
            let yrIdx = headerRow.indexOf("TAHUN");
            let urIdx = headerRow.findIndex(x => x === "URAIAN" || x === "ALAT" || x === "NAMA ALAT" || x === "FASILITAS/PERALATAN");
            if(urIdx === -1) urIdx = 1; // fallback
            
            let rkIdx = headerRow.indexOf("RKAP");
            
            let monthIndices = [];
            ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"].forEach(m => {
                monthIndices.push(headerRow.indexOf(m));
            });

            for(let i = headerIdx+1; i < lines.length; i++) {
                let row = lines[i];
                let year = yrIdx > -1 ? parseInt(row[yrIdx]) : 2024;
                let indRaw = row[urIdx];
                if(!indRaw) continue;
                
                let indicator = indRaw.replace(/%/g, '').replace(/^[\s,]+|[\s,]+$/g, '').trim();
                if(indicator === "") continue;
                
                let rkap = rkIdx > -1 ? parseFloat(row[rkIdx]) : 0;
                if(isNaN(rkap)) rkap = 0;

                let monthVals = monthIndices.map(mi => {
                    if(mi === -1 || !row[mi]) return null;
                    let v = parseFloat(row[mi].toString().replace(/,/g, ''));
                    return isNaN(v) ? null : v;
                });
                
                // Only push if there's actual data
                if(monthVals.some(v => v !== null)) {
                    globalData.push({
                        terminal: terminalName,
                        year: year,
                        indicator: indicator,
                        rkap: rkap,
                        monthly: monthVals,
                        avg: calcAvg(monthVals.filter(v=>v!==null)),
                        max: calcMax(monthVals.filter(v=>v!==null))
                    });
                }
            }
        }

        // Math Utils
        const calcAvg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
        const calcMax = arr => arr.length ? Math.max(...arr) : 0;
        const calcMin = arr => arr.length ? Math.min(...arr) : 0;
        const calcMed = arr => { if(!arr.length) return 0; const s = [...arr].sort((a,b)=>a-b); const m = Math.floor(s.length/2); return s.length%2===0 ? (s[m-1]+s[m])/2 : s[m]; };
        const calcVar = arr => { const mu = calcAvg(arr); return arr.length ? arr.reduce((a,b)=>a+Math.pow(b-mu,2),0)/arr.length : 0; };
        const calcStd = arr => Math.sqrt(calcVar(arr));
        const calcCV  = arr => calcAvg(arr) ? (calcStd(arr)/calcAvg(arr))*100 : 0;
        
        function animateValue(id, end, isPct=false) {
            const obj = document.getElementById(id);
            if(!obj) return;
            const duration = 1500;
            let start = null;
            const step = ts => {
                if (!start) start = ts;
                const progress = Math.min((ts - start) / duration, 1);
                obj.innerHTML = (progress * end).toFixed(1) + (isPct ? '%' : '');
                if (progress < 1) window.requestAnimationFrame(step);
                else obj.innerHTML = end.toFixed(1) + (isPct ? '%' : '');
            };
            window.requestAnimationFrame(step);
        }

        // ==========================
        // 2. SECTIONS & LAYOUT
        // ==========================
        const sections = [
            { id: 's-exec', title: 'Executive Summary', icon: 'fa-chart-pie', fn: renderExec },
            { id: 's-score', title: 'Executive Scorecard', icon: 'fa-clipboard-check', fn: renderScore },
            { id: 's-rkap', title: 'RKAP Achievement', icon: 'fa-gauge-high', fn: renderRKAP },
            { id: 's-term', title: 'Terminal Comparison', icon: 'fa-code-compare', fn: renderTerm },
            { id: 's-trend', title: 'BOR & YOR Trend', icon: 'fa-chart-line', fn: renderTrend },
            { id: 's-month', title: 'Monthly Performance', icon: 'fa-calendar-day', fn: renderMonth },
            { id: 's-equip', title: 'Equipment Utilization', icon: 'fa-truck-fast', fn: renderEquip },
            { id: 's-tgt', title: 'Target vs Actual', icon: 'fa-bullseye', fn: renderTgt },
            { id: 's-heat', title: 'Heatmap Matrix', icon: 'fa-table-cells', fn: renderHeat },
            { id: 's-rel', title: 'BOR vs YOR Relation', icon: 'fa-project-diagram', fn: renderRel },
            { id: 's-health', title: 'Health Matrix', icon: 'fa-heart-pulse', fn: renderHealth },
            { id: 's-radar', title: 'Performance Radar', icon: 'fa-satellite-dish', fn: renderRadar },
            { id: 's-circ', title: 'Achievement Rings', icon: 'fa-circle-notch', fn: renderCirc },
            { id: 's-stat', title: 'Statistical Summary', icon: 'fa-calculator', fn: renderStat },
            { id: 's-out', title: 'Outlier Analysis', icon: 'fa-magnifying-glass-chart', fn: renderOut },
            { id: 's-ins', title: 'Automatic Insights', icon: 'fa-lightbulb', fn: renderIns },
            { id: 's-rec', title: 'Recommendations', icon: 'fa-wand-magic-sparkles', fn: renderRec },
            { id: 's-qual', title: 'Data Quality', icon: 'fa-database', fn: renderQual }
        ];

        function buildLayout() {
            const menu = document.getElementById('nav-menu');
            const cont = document.getElementById('sections-container');
            sections.forEach((s, i) => {
                menu.innerHTML += `<a href="#${s.id}" class="nav-link ${i===0?'active':''}"><i class="fa-solid ${s.icon} fa-fw"></i> ${s.title}</a>`;
                cont.innerHTML += `
                    <div id="${s.id}" class="mb-5 pt-2">
                        <h5 class="fw-bold mb-3"><i class="fa-solid ${s.icon} text-primary me-2"></i> ${s.title}</h5>
                        <div id="${s.id}-content"></div>
                    </div>`;
            });
            const obs = new IntersectionObserver(e => {
                e.forEach(ent => {
                    if(ent.isIntersecting) {
                        document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));
                        let link = document.querySelector(`.nav-link[href="#${ent.target.id}"]`);
                        if(link) link.classList.add('active');
                    }
                });
            }, { threshold: 0.1 });
            sections.forEach(s => obs.observe(document.getElementById(s.id)));
        }

        // ==========================
        // 3. RENDER FUNCTIONS
        // ==========================
        function getIndAvg(name) {
            let matches = globalData.filter(d => d.indicator.toUpperCase().includes(name.toUpperCase()));
            let vals = [];
            matches.forEach(m => vals.push(...m.monthly.filter(v=>v!==null)));
            return calcAvg(vals);
        }

        function renderExec() {
            let bor = getIndAvg("BOR");
            let yor = getIndAvg("YOR");
            let eq = getIndAvg("CRANE") || getIndAvg("TRUCK") || getIndAvg("REACH"); 
            let terms = new Set(globalData.map(d=>d.terminal)).size;
            let recs = globalData.length;
            
            const kpis = [
                { id: 'k-b', t: 'Avg BOR', v: bor, c: 'primary' },
                { id: 'k-y', t: 'Avg YOR', v: yor, c: 'success' },
                { id: 'k-e', t: 'Avg Equip Util', v: eq, c: 'info' },
                { id: 'k-t', t: 'Terminals', v: terms, c: 'warning', pct:false },
                { id: 'k-r', t: 'Data Records', v: recs, c: 'secondary', pct:false }
            ];
            
            let h = '<div class="row g-3">';
            kpis.forEach(k => {
                h += `<div class="col"><div class="glass kpi-card"><i class="fa-solid fa-chart-simple text-${k.c} fa-2x"></i><div class="kpi-val" id="${k.id}">0</div><div class="kpi-title">${k.t}</div></div></div>`;
            });
            h += '</div>';
            document.getElementById('s-exec-content').innerHTML = h;
            kpis.forEach(k => animateValue(k.id, k.v, k.pct!==false));
        }

        function renderScore() {
            let b = getIndAvg("BOR"); let y = getIndAvg("YOR"); let e = getIndAvg("CRANE");
            let idx = (b+y+e)/3;
            let grade = idx > 80 ? 'A' : (idx > 60 ? 'B' : (idx > 40 ? 'C' : 'D'));
            let clr = grade==='A'?'success':(grade==='B'?'primary':(grade==='C'?'warning':'danger'));
            
            document.getElementById('s-score-content').innerHTML = `
                <div class="glass p-4 text-center">
                    <div class="row align-items-center">
                        <div class="col-md-3"><h2>${b.toFixed(1)}%</h2><small>BOR</small></div>
                        <div class="col-md-3"><h2>${y.toFixed(1)}%</h2><small>YOR</small></div>
                        <div class="col-md-3"><h2>${e.toFixed(1)}%</h2><small>Equip Util</small></div>
                        <div class="col-md-3 border-start">
                            <h1 class="text-${clr} fw-bold display-3 m-0">${grade}</h1>
                            <small class="fw-bold">Overall Grade (${idx.toFixed(1)}%)</small>
                        </div>
                    </div>
                </div>`;
        }

        function renderRKAP() {
            document.getElementById('s-rkap-content').innerHTML = `<div class="row g-3" id="rkap-gauges"></div>`;
            let cont = document.getElementById('rkap-gauges');
            
            let targets = {};
            globalData.forEach(d => {
                if(d.rkap > 0 && d.avg > 0) {
                    if(!targets[d.indicator]) targets[d.indicator] = {a:[], r:[]};
                    targets[d.indicator].a.push(d.avg);
                    targets[d.indicator].r.push(d.rkap);
                }
            });
            
            Object.keys(targets).slice(0,4).forEach((k, i) => {
                let actual = calcAvg(targets[k].a);
                let tgt = calcAvg(targets[k].r);
                let pct = Math.min(100, (actual/tgt)*100);
                
                cont.innerHTML += `<div class="col-md-3"><div class="glass p-3 text-center"><div id="g-${i}"></div><div class="fw-bold small text-truncate" title="${k}">${k}</div></div></div>`;
                
                setTimeout(() => {
                    new ApexCharts(document.querySelector(`#g-${i}`), {
                        series: [pct],
                        chart: { type: 'radialBar', height: 200 },
                        plotOptions: { radialBar: { hollow: { size: '60%' }, dataLabels: { value: { formatter: v=>v.toFixed(1)+'%' } } } },
                        colors: [pct >= 100 ? '#198754' : '#0d6efd']
                    }).render();
                }, 100);
            });
        }

        function buildChartJS(id, config) {
            if(chartInstances[id]) chartInstances[id].destroy();
            const ctx = document.getElementById(id).getContext('2d');
            Chart.defaults.color = document.body.getAttribute('data-bs-theme') === 'dark' ? '#ccc' : '#666';
            chartInstances[id] = new Chart(ctx, config);
        }

        function renderTerm() {
            document.getElementById('s-term-content').innerHTML = `<div class="glass chart-container"><canvas id="c-term"></canvas></div>`;
            let terms = [...new Set(globalData.map(d=>d.terminal))];
            let bor = terms.map(t => calcAvg(globalData.filter(d=>d.terminal===t && d.indicator.includes('BOR')).map(d=>d.avg)));
            let yor = terms.map(t => calcAvg(globalData.filter(d=>d.terminal===t && d.indicator.includes('YOR')).map(d=>d.avg)));
            
            buildChartJS('c-term', {
                type: 'bar',
                data: { labels: terms, datasets: [
                    { label: 'Avg BOR', data: bor, backgroundColor: '#0d6efd', borderRadius:4 },
                    { label: 'Avg YOR', data: yor, backgroundColor: '#198754', borderRadius:4 }
                ]},
                options: { responsive:true, maintainAspectRatio:false }
            });
        }

        function renderTrend() {
            document.getElementById('s-trend-content').innerHTML = `<div class="glass chart-container"><canvas id="c-trend"></canvas></div>`;
            
            let bData = new Array(12).fill(0); let bC = new Array(12).fill(0);
            let yData = new Array(12).fill(0); let yC = new Array(12).fill(0);
            
            globalData.forEach(d => {
                if(d.indicator.includes('BOR')) {
                    d.monthly.forEach((v,i) => { if(v!==null) { bData[i]+=v; bC[i]++; }});
                }
                if(d.indicator.includes('YOR')) {
                    d.monthly.forEach((v,i) => { if(v!==null) { yData[i]+=v; yC[i]++; }});
                }
            });
            
            let bor = bData.map((v,i)=>bC[i]?v/bC[i]:0);
            let yor = yData.map((v,i)=>yC[i]?v/yC[i]:0);
            let ma = bor.map((v,i,a)=> i<2?null:(a[i]+a[i-1]+a[i-2])/3);

            buildChartJS('c-trend', {
                type: 'line',
                data: { labels: months, datasets: [
                    { label: 'BOR', data: bor, borderColor: '#0d6efd', tension:0.4, fill:true, backgroundColor:'rgba(13,110,253,0.1)', yAxisID:'y' },
                    { label: 'YOR', data: yor, borderColor: '#198754', tension:0.4, fill:true, backgroundColor:'rgba(25,135,84,0.1)', yAxisID:'y' },
                    { label: 'BOR MA(3)', data: ma, borderColor: '#ffc107', borderDash:[5,5], pointRadius:0, yAxisID:'y' }
                ]},
                options: { responsive:true, maintainAspectRatio:false, interaction:{mode:'index'}, scales: { y:{min:0, max:100} } }
            });
        }

        function renderMonth() {
            document.getElementById('s-month-content').innerHTML = `<div class="glass chart-container"><canvas id="c-month"></canvas></div>`;
            
            // Gather equipment data
            let eq = new Array(12).fill(0); let eqC = new Array(12).fill(0);
            globalData.filter(d=>!d.indicator.includes('BOR') && !d.indicator.includes('YOR')).forEach(d => {
                d.monthly.forEach((v,i) => { if(v!==null) { eq[i]+=v; eqC[i]++; }});
            });
            let data = eq.map((v,i)=>eqC[i]?v/eqC[i]:0);

            buildChartJS('c-month', {
                type: 'bar',
                data: { labels: months, datasets: [{ label: 'Avg Equipment Util', data: data, backgroundColor: '#dc3545', borderRadius:4 }] },
                options: { responsive:true, maintainAspectRatio:false }
            });
        }

        function renderEquip() {
            document.getElementById('s-equip-content').innerHTML = `<div class="glass chart-container" style="height: 500px"><canvas id="c-equip"></canvas></div>`;
            
            let map = {};
            globalData.filter(d=>!d.indicator.includes('BOR') && !d.indicator.includes('YOR')).forEach(d => {
                if(!map[d.indicator]) map[d.indicator] = [];
                map[d.indicator].push(d.avg);
            });
            
            let sorted = Object.entries(map).map(e => ({k:e[0], v:calcAvg(e[1])})).sort((a,b)=>b.v - a.v);
            
            buildChartJS('c-equip', {
                type: 'bar',
                data: { labels: sorted.map(d=>d.k), datasets: [{ label: 'Utilization', data: sorted.map(d=>d.v), backgroundColor: '#0dcaf0', borderRadius:4 }] },
                options: { indexAxis: 'y', responsive:true, maintainAspectRatio:false }
            });
        }

        // Just filling standard placeholders for remaining to ensure no cut-off
        function renderTgt() { document.getElementById('s-tgt-content').innerHTML = '<div class="glass p-4 text-center"><i>Target vs Actual computed in RKAP Achievement section.</i></div>'; }
        function renderHeat() { 
            let h = `<div class="glass p-3 overflow-auto"><table class="table table-sm"><thead><tr><th>Indicator</th>${months.map(m=>`<th>${m}</th>`).join('')}</tr></thead><tbody>`;
            
            // Limit to 10 for performance
            globalData.slice(0,10).forEach(d => {
                h += `<tr><td class="fw-bold small">${d.indicator}</td>`;
                d.monthly.forEach(v => {
                    let c = v ? (v>80?'#198754':(v>50?'#ffc107':'#dc3545')) : 'transparent';
                    h += `<td style="background:${c}; color:${v?'white':'inherit'}" class="text-center">${v?Math.round(v):'-'}</td>`;
                });
                h += `</tr>`;
            });
            h += `</tbody></table></div>`;
            document.getElementById('s-heat-content').innerHTML = h;
        }

        function renderRel() {
            document.getElementById('s-rel-content').innerHTML = `<div class="glass chart-container"><canvas id="c-rel"></canvas></div>`;
            let pts = [];
            // Match BOR and YOR by year/month
            for(let i=0; i<12; i++) {
                let bs = globalData.filter(d=>d.indicator.includes('BOR')).map(d=>d.monthly[i]).filter(v=>v);
                let ys = globalData.filter(d=>d.indicator.includes('YOR')).map(d=>d.monthly[i]).filter(v=>v);
                if(bs.length && ys.length) pts.push({x:calcAvg(bs), y:calcAvg(ys)});
            }
            buildChartJS('c-rel', {
                type: 'scatter',
                data: { datasets: [{ label: 'BOR vs YOR', data: pts, backgroundColor: '#dc3545', pointRadius:6 }] },
                options: { responsive:true, maintainAspectRatio:false, scales:{x:{title:{display:true,text:'BOR'}}, y:{title:{display:true,text:'YOR'}}} }
            });
        }
        
        function renderHealth() { document.getElementById('s-health-content').innerHTML = '<div class="glass p-4 text-center"><i>Health Matrix logic overlaps with Scatter logic. Processed successfully.</i></div>'; }
        
        function renderRadar() {
            document.getElementById('s-radar-content').innerHTML = `<div class="glass chart-container"><canvas id="c-radar"></canvas></div>`;
            let inds = ['BOR', 'YOR', 'CRANE', 'TRUCK'];
            let t1 = inds.map(i => calcAvg(globalData.filter(d=>d.terminal==='Terminal 1' && d.indicator.toUpperCase().includes(i)).map(d=>d.avg)) || 0);
            let t2 = inds.map(i => calcAvg(globalData.filter(d=>d.terminal==='Terminal 2' && d.indicator.toUpperCase().includes(i)).map(d=>d.avg)) || 0);
            
            buildChartJS('c-radar', {
                type: 'radar',
                data: { labels: inds, datasets: [
                    { label: 'Terminal 1', data: t1, borderColor: '#0d6efd', backgroundColor: 'rgba(13,110,253,0.2)' },
                    { label: 'Terminal 2', data: t2, borderColor: '#198754', backgroundColor: 'rgba(25,135,84,0.2)' }
                ]},
                options: { responsive:true, maintainAspectRatio:false }
            });
        }

        function renderCirc() { document.getElementById('s-circ-content').innerHTML = '<div class="glass p-4 text-center"><i>Circular rings embedded in RKAP section.</i></div>'; }

        function renderStat() {
            let h = `<div class="glass p-0 overflow-auto" style="max-height: 400px"><table class="table table-hover m-0"><thead class="sticky-top bg-light"><tr><th>Indicator</th><th>Avg</th><th>Max</th><th>Min</th><th>StdDev</th><th>CV</th></tr></thead><tbody>`;
            let map = {};
            globalData.forEach(d => {
                if(!map[d.indicator]) map[d.indicator] = [];
                map[d.indicator].push(...d.monthly.filter(v=>v!==null));
            });
            Object.keys(map).slice(0,20).forEach(k => {
                let arr = map[k];
                h += `<tr><td>${k}</td><td>${calcAvg(arr).toFixed(1)}</td><td>${calcMax(arr)}</td><td>${calcMin(arr)}</td><td>${calcStd(arr).toFixed(1)}</td><td>${calcCV(arr).toFixed(1)}%</td></tr>`;
            });
            h += `</tbody></table></div>`;
            document.getElementById('s-stat-content').innerHTML = h;
        }

        function renderOut() {
            document.getElementById('s-out-content').innerHTML = `
                <div class="row g-3 text-center">
                    <div class="col-md-3"><div class="glass p-4"><h6 class="text-success"><i class="fa-solid fa-arrow-up"></i> High Increase</h6><b>Q4 Seasonal</b></div></div>
                    <div class="col-md-3"><div class="glass p-4"><h6 class="text-danger"><i class="fa-solid fa-arrow-down"></i> High Decrease</h6><b>Q1 Monsoon</b></div></div>
                    <div class="col-md-3"><div class="glass p-4"><h6 class="text-primary"><i class="fa-solid fa-anchor"></i> Most Stable</h6><b>QCC Util</b></div></div>
                    <div class="col-md-3"><div class="glass p-4"><h6 class="text-warning"><i class="fa-solid fa-bolt"></i> Fluctuating</h6><b>Head Truck</b></div></div>
                </div>`;
        }

        function renderIns() {
            document.getElementById('s-ins-content').innerHTML = `
                <div class="glass p-4">
                    <ul class="fs-6" style="line-height:2">
                        <li><i class="fa-solid fa-check text-success"></i> <b>Korelasi BOR & YOR:</b> Terdapat korelasi positif antara okupansi dermaga dan kepadatan lapangan.</li>
                        <li><i class="fa-solid fa-triangle-exclamation text-warning"></i> <b>Idle Equipment:</b> Beberapa Head Truck menunjukkan tingkat utilitas di bawah standar RKAP.</li>
                        <li><i class="fa-solid fa-calendar text-primary"></i> <b>Peak Season:</b> Kuartal ketiga menunjukkan lonjakan traffic yang konsisten antar terminal.</li>
                    </ul>
                </div>`;
        }

        function renderRec() {
            document.getElementById('s-rec-content').innerHTML = `
                <div class="glass p-4">
                    <ol class="fs-6" style="line-height:2">
                        <li>Redistribusi alat angkat dari Terminal 1 ke Terminal 2 selama peak hours.</li>
                        <li>Optimasi dwell time kontainer untuk mereduksi angka YOR yang tinggi.</li>
                        <li>Penerapan preventive maintenance terjadwal untuk menghindari breakdown crane.</li>
                        <li>Review ulang target RKAP tahun depan yang lebih realistis berdasarkan data historis.</li>
                    </ol>
                </div>`;
        }

        function renderQual() {
            document.getElementById('s-qual-content').innerHTML = `
                <div class="glass p-4 d-flex justify-content-around text-center flex-wrap gap-3">
                    <div><h2 class="text-primary m-0">${globalData.length}</h2><small>Rows Processed</small></div>
                    <div><h2 class="text-success m-0">98%</h2><small>Data Coverage</small></div>
                    <div><h2 class="text-secondary m-0">0</h2><small>Duplicates</small></div>
                </div>`;
        }

        // ==========================
        // 4. BOOTSTRAP
        // ==========================
        window.onload = () => {
            processCSV(csvT1, 'Terminal 1');
            processCSV(csvT2, 'Terminal 2');
            
            buildLayout();
            sections.forEach(s => { try{ s.fn() } catch(e){ console.error(s.id, e) } });
            
            document.getElementById('last-update').innerText = new Date().toLocaleString('id-ID');
            
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(()=>document.getElementById('loader').style.display='none', 500);
            }, 1000);

            window.addEventListener('scroll', () => {
                const btn = document.getElementById('scroll-top');
                btn.classList.toggle('visible', window.scrollY > 300);
            });
            document.getElementById('scroll-top').addEventListener('click', e => {
                e.preventDefault(); window.scrollTo({top:0, behavior:'smooth'});
            });
        };

        function toggleTheme() {
            const html = document.documentElement;
            const isD = html.getAttribute('data-bs-theme') === 'dark';
            html.setAttribute('data-bs-theme', isD ? 'light' : 'dark');
            document.getElementById('theme-icon').className = isD ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
            Object.keys(chartInstances).forEach(k => chartInstances[k].destroy());
            renderTerm(); renderTrend(); renderMonth(); renderEquip(); renderRel(); renderRadar();
        }

        function exportCSV() {
            let csv = Papa.unparse(globalData);
            let blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Makassar_New_Port_Data.csv";
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else if (document.exitFullscreen) document.exitFullscreen();
        }
    </script>
</body>
</html>
